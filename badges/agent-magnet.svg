<svg xmlns="http://www.w3.org/2000/svg" width="900" height="210" viewBox="0 0 900 210" role="img" aria-labelledby="title desc">
  <title id="title">DayOneBuilder Agent Magnet badge</title>
  <desc id="desc">A README-ready badge showing Agent Pull Score, task rank, 30 day agent routes, install copies, and smoke-test status.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset=".55" stop-color="#08090a"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <radialGradient id="glow" cx=".86" cy=".18" r=".46">
      <stop offset="0" stop-color="#34d399" stop-opacity=".38"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="#ffffff" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="900" height="210" rx="18" fill="url(#bg)"/>
  <rect width="900" height="210" rx="18" fill="url(#glow)"/>
  <rect width="900" height="210" rx="18" fill="url(#grid)" opacity=".72"/>
  <rect x="1" y="1" width="898" height="208" rx="17" fill="none" stroke="#ffffff" stroke-opacity=".16"/>

  <g transform="translate(30 28)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect width="244" height="34" rx="17" fill="#34d399" fill-opacity=".1" stroke="#34d399" stroke-opacity=".5"/>
    <circle cx="19" cy="17" r="5" fill="#34d399"/>
    <text x="34" y="22" fill="#d1fae5" font-size="14" font-weight="800">DAYONEBUILDER AGENT MAGNET</text>
    <text x="0" y="88" fill="#f8fafc" font-size="42" font-weight="820">Agent Pull 82</text>
    <text x="0" y="119" fill="#cbd5df" font-size="16">Visible agent demand, not a claim.</text>
    <text x="0" y="151" fill="#87909d" font-size="13">Task -> source -> install/call -> smoke test</text>
  </g>

  <g transform="translate(475 31)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect width="176" height="66" rx="12" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".13"/>
    <text x="16" y="23" fill="#87909d" font-size="11" font-weight="760">TASK RANK</text>
    <text x="16" y="50" fill="#f8fafc" font-size="25" font-weight="820">#1</text>
    <text x="61" y="50" fill="#cbd5df" font-size="14">browser MCP</text>

    <rect x="192" width="176" height="66" rx="12" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".13"/>
    <text x="208" y="23" fill="#87909d" font-size="11" font-weight="760">30D AGENT ROUTES</text>
    <text x="208" y="50" fill="#f8fafc" font-size="25" font-weight="820">38</text>
    <text x="255" y="50" fill="#cbd5df" font-size="14">clicks</text>

    <rect y="82" width="176" height="66" rx="12" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".13"/>
    <text x="16" y="105" fill="#87909d" font-size="11" font-weight="760">INSTALL INTENT</text>
    <text x="16" y="132" fill="#f8fafc" font-size="25" font-weight="820">14</text>
    <text x="61" y="132" fill="#cbd5df" font-size="14">copies</text>

    <rect x="192" y="82" width="176" height="66" rx="12" fill="#34d399" fill-opacity=".09" stroke="#34d399" stroke-opacity=".35"/>
    <text x="208" y="105" fill="#87909d" font-size="11" font-weight="760">SMOKE TEST</text>
    <circle cx="219" cy="128" r="6" fill="#34d399"/>
    <text x="235" y="133" fill="#f8fafc" font-size="22" font-weight="820">PASS</text>
  </g>
</svg>
