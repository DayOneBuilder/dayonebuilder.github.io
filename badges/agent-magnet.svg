<svg xmlns="http://www.w3.org/2000/svg" width="560" height="176" viewBox="0 0 560 176" role="img" aria-labelledby="title desc">
  <title id="title">Agent Magnet GitHub signal badge for upstash/context7</title>
  <desc id="desc">Agent Pull score generated from public GitHub API signals: stars, forks, watchers, freshness, license, topics, and contributor activity.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#12312d"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="560" height="176" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="558" height="174" rx="11" fill="none" stroke="#ffffff" stroke-opacity="0.16"/>
  <text x="24" y="34" fill="#c4f1df" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700">AGENT MAGNET</text>
  <text x="24" y="68" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">Agent Pull 99</text>
  <text x="348" y="39" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" text-anchor="end">GitHub public API</text>
  <text x="24" y="88" fill="#b7c7d8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12">Context7 - upstash/context7</text>

  <g transform="translate(24 104)">
    <rect width="112" height="48" rx="8" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="12" y="20" fill="#f8fafc" font-size="18" font-weight="700">54.3k</text>
    <text x="12" y="36" fill="#a7b5c7" font-size="10" font-weight="600">stars</text>
  </g>

  <g transform="translate(152 104)">
    <rect width="112" height="48" rx="8" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="12" y="20" fill="#f8fafc" font-size="18" font-weight="700">2.6k</text>
    <text x="12" y="36" fill="#a7b5c7" font-size="10" font-weight="600">forks</text>
  </g>

  <g transform="translate(280 104)">
    <rect width="112" height="48" rx="8" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="12" y="20" fill="#f8fafc" font-size="18" font-weight="700">151</text>
    <text x="12" y="36" fill="#a7b5c7" font-size="10" font-weight="600">watching</text>
  </g>

  <g transform="translate(408 104)">
    <rect width="112" height="48" rx="8" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="12" y="20" fill="#f8fafc" font-size="18" font-weight="700">today</text>
    <text x="12" y="36" fill="#a7b5c7" font-size="10" font-weight="600">fresh - MIT</text>
